<!DOCTYPE html>
<html lang="es" class="light dark">

<head>

    <meta charset="UTF-8">
    <title>Chistes de Integrantes - PWA con MD</title>

    <script src="js/registraServiceWorker.js"></script>

    <meta name="viewport" content="width=device-width">
    <meta name="theme-color" content="#fffbfe">
    <link rel="icon" sizes="32x32" href="favicon.ico">
    <link rel="manifest" href="site.webmanifest">
    <script src="ungap/custom-elements.js"></script>

    <script type="module" src="js/configura.js"></script>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/transicion_completa.css">

</head>

<body>

    <form id="form" novalidate onsubmit="procesa(event)">

        <md-top-app-bar>

            <h1>Chistes de Integrantes</h1>

            <button is="md-menu-button" slot="navigation"></button>

        </md-top-app-bar>

        <main>

            <p>
                <span class="md-filled-text-field" accesskey="I">
                    <md-select-menu id="selectIntegrantes" required options="opcionesDeIntegrantes"
                        oninput="copiaMensajes()"></md-select-menu>
                    <span>**Integrantes** *</span>
                    <small id="supportingIntegrantes">Obligatorio</small>
                </span>
            </p>

            <p>
                <button class="md-filled-button" style="width: 100%;">Contar Chiste</button>
            </p>

        </main>

        <md-options-menu id="opcionesDeIntegrantes" aria-label="Opciones de integrantes">
            <span data-value="" title="Selecciona un integrante"></span>
            <span data-value="Angel" title="Angel">Angel</span>
            <span data-value="Missael" title="Missael">Missael</span>
            <span data-value="Marco" title="Marco">Marco</span>
            <span data-value="Antonio" title="Antonio">Antonio</span>
            <span data-value="Jessica" title="Jessica">Jessica</span>
            <span data-value="Esther" title="Esther">Esther</span>
        </md-options-menu>

        <!-- NAVEGACIÓN LATERAL: Enlaces para navegar -->
        <nav-drw>
            <a href="index.html" is="md-navigation-item" selected>Formulario</a>
            <a href="ayuda.html" is="md-navigation-item">Ayuda</a>
        </nav-drw>

    </form>

    <script type="module">
        import { muestraTextoDeAyuda } from "muestraTextoDeAyuda.js"
        import { exportaAHtml } from "exportaAHtml.js"
        import { muestraError } from "muestraError.js"

        // Se obtienen las referencias a los nuevos IDs
        const selectIntegrantes = document.getElementById("selectIntegrantes");
        const supportingIntegrantes = document.getElementById("supportingIntegrantes");

        function copiaMensajes() {
            // Uso de los nuevos IDs
            muestraTextoDeAyuda(selectIntegrantes, supportingIntegrantes, "Obligatorio")
        }
        exportaAHtml(copiaMensajes)

        /**
         * @param {SubmitEvent} evt
         */
        function procesa(evt) {
            evt.preventDefault()
            try {
                copiaMensajes()
                if (
                    // Uso del nuevo ID
                    selectIntegrantes.validity.valid) {
                    // Uso del nuevo ID y variable
                    const integrante = selectIntegrantes.value
                    const resultado = cuentaChiste(integrante) // Llamada a la nueva función
                    // Se usa un modal o mensaje en lugar de alert() en un entorno de producción, 
                    // pero mantendremos alert() si el código original lo usaba.
                    alert(resultado)
                }
            } catch (e) {
                muestraError(e)
            }
        }
        exportaAHtml(procesa)

        /** * @param {string} integrante 
         * Función que cuenta un chiste diferente por cada integrante
         */
        function cuentaChiste(integrante) {
            switch (integrante) {
                case "Angel":
                    return "Angel: ¿Qué hace un pez en una balanza? Pesar.";
                case "Missael":
                    return "Missael: ¿Qué hace una abeja en el gimnasio? ¡Zumba!";
                case "Marco":
                    return "Marco: ¿Qué le dice un jardinero a otro? Nos vemos cuando podamos.";
                case "Antonio":
                    return "Antonio: Había dos puertas, una decía 'El paraíso' y la otra 'Chistes malos'. Entró a la de 'Chistes malos'... ¡y la puerta se le cayó encima!";
                case "Jessica":
                    return "Jessica: ¿Cuál es el café más peligroso? El *expresso*.";
                case "Esther":
                    return "Esther: ¿Qué hace una vaca mirando a un tren? ¡Ver pasar el tiempo!";
                default:
                    return "Por favor, selecciona un integrante.";
            }
        }
    </script>

</body>

</html>
